<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>proto w2 - Responsive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Plus+Jakarta+Sans:wght@700&display=swap" rel="stylesheet">
    <style>
        
         #intro-screen {
             position: fixed;
             top: 0;
             left: 0;
             width: 100%;
             height: 100%;
             display: flex;
             flex-direction: column;
             justify-content: center; /* 세로 중앙 정렬 */
             align-items: center;     /* 가로 중앙 정렬 */
             z-index: 100;
             background: transparent; /* 배경은 p5.js가 보여야 하므로 투명하게 */
             }

.content-wrapper {
    text-align: center;
    /* ↓ 제목과 버튼을 통째로 위아래로 움직이고 싶을 때 이 값을 조절하세요 */
    margin-top: 36vh;
}

.main-title {
    color: rgb(4, 0, 0);
    font-family: 'DM Serif Display', serif;
    /* ↓ 글자 크기 조절 (화면 너비의 8%) */
    font-size: 8vw; 
    line-height: 0.8;
    margin-top: 120px;
    margin-bottom: 30px;
}

#start-button {
    background: rgba(255, 255, 255, 0);
    color: rgb(0, 0, 0);
    border: none;
    cursor: pointer;
    border-radius: 100px;
    font-family: 'Plus Jakarta Sans', sans-serif;  /* ← 이것만 바꿈 */
    font-weight: bold;
    opacity: 0.8;
    padding: 45px 100px;
    font-size: 240px;
    transition: opacity 0.3s;
}

#start-button:hover {
    opacity: 0.8;
}

#restart-button {
    display: none;
    position: fixed;
    bottom: 48px;
    right: 60px;
    background: transparent;
    border: none;
    cursor: pointer;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: bold;
    font-size: 180px;
    color: rgb(4, 0, 0);
    opacity: 0.6;
    z-index: 200;
    transition: opacity 0.2s;
}

#restart-button:hover {
    opacity: 1;
}
</style>
   
</head>
<body>
    
    <button id="restart-button">Restart</button>

    <div id="intro-screen">
    <div class="content-wrapper"> 
        
        
        
        <button id="start-button">Click to Open</button>
        <h1 class="main-title"> Musical Matryoshka </h1>
    </div>
</div>



    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.1/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.1/addons/p5.sound.min.js"></script>
    <script src="sketch.js"></script>
</body>
</html>
